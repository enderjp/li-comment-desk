<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmando cuenta...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 60px;
      height: 60px;
      margin: 0 auto 24px;
      border: 5px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Confirmando tu cuenta</h1>
    <p>Serás redirigido en un momento...</p>
  </div>
  <script>
    // Redirect to root with hash preserved
    const hash = window.location.hash;
    console.log('Current URL:', window.location.href);
    console.log('Hash:', hash);

    // Get the base URL without confirm.html
    const currentPath = window.location.pathname;
    const basePath = currentPath.replace(/\/confirm\.html$/, '');
    const newUrl = window.location.origin + basePath + '/' + hash;

    console.log('Redirecting to:', newUrl);

    // Use setTimeout to ensure the page has loaded
    setTimeout(function() {
      window.location.replace(newUrl);
    }, 100);
  </script>
</body>
</html>
